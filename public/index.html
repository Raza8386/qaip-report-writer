<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QAIP Self-Assessment Tracker — IIA Global Standards 2024</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#f0f4f8;color:#1e293b;min-height:100vh}

/* ── Navbar ── */
.navbar{position:fixed;top:0;left:0;right:0;height:56px;background:#1a3a5c;display:flex;align-items:center;padding:0 20px;gap:16px;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.3)}
.navbar .brand{color:#fff;font-size:1rem;font-weight:700;white-space:nowrap}
.navbar .sub{color:#93c5fd;font-size:.75rem;margin-left:8px}
.navbar .spacer{flex:1}
.save-status{color:#86efac;font-size:.75rem}
.nav-btn{padding:6px 14px;border-radius:6px;border:none;cursor:pointer;font-size:.8rem;font-weight:600;white-space:nowrap}
.btn-export{background:#0ea5e9;color:#fff}
.btn-export:hover{background:#0284c7}
.btn-rw{background:transparent;color:#93c5fd;border:1px solid #3b82f6}
.btn-rw:hover{background:#1e40af;color:#fff}
.btn-reset{background:transparent;color:#fca5a5;border:1px solid #ef4444;font-size:.75rem;padding:5px 10px}
.btn-reset:hover{background:#7f1d1d;color:#fff}

/* ── Layout ── */
.layout{display:flex;padding-top:56px;min-height:100vh}

/* ── Sidebar ── */
.sidebar{width:260px;position:fixed;top:56px;left:0;bottom:0;background:#1a3a5c;overflow-y:auto;padding:16px 0;display:flex;flex-direction:column;gap:0}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-thumb{background:#2d5a8a}

.overall-box{padding:16px;border-bottom:1px solid #2d5a8a;margin-bottom:8px}
.overall-label{color:#93c5fd;font-size:.7rem;text-transform:uppercase;letter-spacing:.05em;margin-bottom:6px}
.overall-stats{display:flex;gap:8px;align-items:center}
.overall-badge{font-size:1.1rem;font-weight:700;padding:4px 10px;border-radius:6px}
.overall-count{color:#cbd5e1;font-size:.75rem}
.overall-bar{height:4px;background:#0f2744;border-radius:2px;margin-top:8px;overflow:hidden}
.overall-bar-fill{height:100%;background:#22c55e;border-radius:2px;transition:width .4s}

.domain-nav-item{padding:10px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:block;text-decoration:none}
.domain-nav-item:hover{background:#0f2744}
.domain-nav-item.active{background:#0f2744;border-left-color:#0ea5e9}
.domain-nav-label{color:#e2e8f0;font-size:.78rem;font-weight:600;line-height:1.3}
.domain-nav-meta{display:flex;justify-content:space-between;align-items:center;margin-top:5px}
.domain-mini-bar{flex:1;height:3px;background:#0f2744;border-radius:2px;margin-right:8px;overflow:hidden}
.domain-mini-fill{height:100%;border-radius:2px;transition:width .4s}
.domain-nav-badge{font-size:.65rem;font-weight:700;padding:1px 6px;border-radius:4px;white-space:nowrap}

/* ── Main ── */
.main{margin-left:260px;flex:1;padding:24px;min-width:0}

/* ── Domain Section ── */
.domain-section{margin-bottom:32px}
.domain-header{background:#fff;border-radius:10px;padding:16px 20px;margin-bottom:16px;display:flex;align-items:center;gap:12px;box-shadow:0 1px 4px rgba(0,0,0,.08);border-left:4px solid #1a3a5c}
.domain-title{font-size:1rem;font-weight:700;color:#1a3a5c;flex:1}
.domain-progress{font-size:.75rem;color:#64748b}
.domain-badge{font-size:.8rem;font-weight:700;padding:4px 12px;border-radius:20px}

/* ── Principle Group ── */
.principle-group{margin-bottom:20px}
.principle-label{font-size:.72rem;font-weight:700;text-transform:uppercase;letter-spacing:.08em;color:#64748b;margin-bottom:10px;padding:0 4px}

/* ── Standard Card ── */
.std-card{background:#fff;border-radius:8px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.07);border:1px solid #e2e8f0;transition:border-color .2s}
.std-card.rated-gc{border-left:4px solid #16a34a}
.std-card.rated-pc{border-left:4px solid #d97706}
.std-card.rated-dnc{border-left:4px solid #dc2626}
.std-card.unrated{border-left:4px solid #d1d5db}

.std-card-header{padding:14px 16px 10px;display:flex;align-items:flex-start;gap:10px;cursor:pointer}
.std-code{font-size:.72rem;font-weight:700;color:#0ea5e9;background:#eff6ff;padding:2px 8px;border-radius:4px;white-space:nowrap;margin-top:2px}
.std-question{font-size:.85rem;font-weight:600;color:#1e293b;flex:1;line-height:1.4}
.std-badge{font-size:.7rem;font-weight:700;padding:3px 8px;border-radius:4px;white-space:nowrap;margin-top:2px}

.std-body{padding:0 16px 14px;border-top:1px solid #f1f5f9}

.evidence-toggle{display:inline-flex;align-items:center;gap:6px;font-size:.75rem;color:#0ea5e9;cursor:pointer;margin:10px 0 6px;user-select:none}
.evidence-toggle:hover{color:#0284c7}
.evidence-toggle svg{transition:transform .2s}
.evidence-toggle.open svg{transform:rotate(90deg)}
.evidence-box{background:#f8fafc;border:1px solid #e2e8f0;border-radius:6px;padding:10px 12px;font-size:.78rem;color:#475569;line-height:1.6;display:none;white-space:pre-wrap;word-break:break-word}
.evidence-box.open{display:block}

.rating-row{display:flex;gap:8px;margin:12px 0 8px;flex-wrap:wrap;align-items:center}
.rating-label{font-size:.72rem;color:#64748b;margin-right:4px}
.r-btn{padding:5px 14px;border-radius:6px;border:2px solid transparent;cursor:pointer;font-size:.78rem;font-weight:700;transition:all .15s;background:#f1f5f9;color:#64748b}
.r-btn:hover{opacity:.85}
.r-btn.gc{border-color:#16a34a;color:#15803d}
.r-btn.gc.active{background:#16a34a;color:#fff}
.r-btn.pc{border-color:#d97706;color:#b45309}
.r-btn.pc.active{background:#d97706;color:#fff}
.r-btn.dnc{border-color:#dc2626;color:#b91c1c}
.r-btn.dnc.active{background:#dc2626;color:#fff}
.r-btn.nr{border-color:#94a3b8;color:#64748b}
.r-btn.nr.active{background:#94a3b8;color:#fff}

.notes-area{width:100%;border:1px solid #e2e8f0;border-radius:6px;padding:8px 10px;font-size:.78rem;font-family:Arial,sans-serif;color:#334155;resize:vertical;min-height:60px;outline:none;transition:border-color .2s}
.notes-area:focus{border-color:#0ea5e9}
.notes-area::placeholder{color:#94a3b8}

/* ── Badge colours ── */
.bg-gc{background:#dcfce7;color:#15803d}
.bg-pc{background:#fef3c7;color:#92400e}
.bg-dnc{background:#fee2e2;color:#991b1b}
.bg-nr{background:#f1f5f9;color:#64748b}
.fill-gc{background:#16a34a}
.fill-pc{background:#d97706}
.fill-dnc{background:#dc2626}
.fill-nr{background:#94a3b8}

/* ── Evidence Upload ── */
.upload-section{margin-top:10px}
.upload-label{font-size:.72rem;color:#64748b;margin-bottom:6px;display:flex;align-items:center;gap:6px}
.upload-zone{border:2px dashed #cbd5e1;border-radius:6px;padding:10px 14px;cursor:pointer;transition:all .2s;background:#fafafa;display:flex;align-items:center;gap:10px}
.upload-zone:hover,.upload-zone.drag-over{border-color:#0ea5e9;background:#eff6ff}
.upload-zone input[type=file]{display:none}
.upload-icon{color:#94a3b8;flex-shrink:0}
.upload-text{font-size:.75rem;color:#94a3b8;line-height:1.4}
.upload-text strong{color:#0ea5e9;font-weight:600}
.file-list{margin-top:6px;display:flex;flex-direction:column;gap:4px}
.file-item{display:flex;align-items:center;gap:8px;background:#f8fafc;border:1px solid #e2e8f0;border-radius:5px;padding:5px 10px}
.file-icon{font-size:.9rem;flex-shrink:0}
.file-name{font-size:.75rem;color:#334155;flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-size{font-size:.68rem;color:#94a3b8;white-space:nowrap}
.file-remove{background:none;border:none;cursor:pointer;color:#94a3b8;font-size:.9rem;padding:0 2px;line-height:1}
.file-remove:hover{color:#dc2626}

/* ── Print / Export ── */
@media print{
  .navbar,.sidebar,.rating-row,.notes-area,.evidence-toggle,.upload-section{display:none!important}
  .main{margin-left:0!important;padding:10px!important}
  .std-body{display:block!important}
  .evidence-box{display:block!important}
}
</style>
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
  <span class="brand">QAIP Self-Assessment Tracker <span class="sub">IIA Global Internal Audit Standards 2024</span></span>
  <div class="spacer"></div>
  <span class="save-status" id="saveStatus">All changes saved</span>
  <button class="nav-btn btn-rw" onclick="location.href='/report-writer.html'">AI Report Writer</button>
  <button class="nav-btn btn-export" onclick="exportSummary()">Export Summary</button>
  <button class="nav-btn btn-reset" onclick="confirmReset()">Reset All</button>
</nav>

<div class="layout">
  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="overall-box">
      <div class="overall-label">Overall Conformance</div>
      <div class="overall-stats">
        <span class="overall-badge bg-nr" id="overallBadge">—</span>
        <span class="overall-count" id="overallCount">0 / 53 assessed</span>
      </div>
      <div class="overall-bar"><div class="overall-bar-fill" id="overallBar" style="width:0%"></div></div>
    </div>
    <div id="domainNav"></div>
  </aside>

  <!-- Main Content -->
  <main class="main" id="main"></main>
</div>

<script>
const QAIP_DATA = [
  {"domain":"I. Purpose of Internal Auditing","principle":"","standard":"","question":"Is the purpose of internal auditing clearly defined and aligned with the organization's mission and value creation?","evidence":"• Internal Audit manual","rating":"GC"},
  {"domain":"II. Ethics and Professionalism","principle":"1. Demonstrate Integrity","standard":"1.1 Honesty and Professional Courage","question":"Are ethics training and performance feedback in place to promote honesty and professional courage?","evidence":"• A training plan that includes ethics education and training.\n• Documents that evidence internal auditors' attendance or participation in ethics education and training.\n• Performance evaluations showing honesty and professional courage as objectives.\n• Feedback from key stakeholders regarding the honesty and courage of internal auditors.","rating":"GC"},
  {"domain":"II. Ethics and Professionalism","principle":"1. Demonstrate Integrity","standard":"1.2 Organization's Ethical Expectations","question":"Are auditors aware of and applying the organization's ethical expectations in their engagements?","evidence":"• Records of internal auditors' participation in workshops, training events, or meetings where ethical expectations and issues were discussed.\n• Forms signed by individual internal auditors acknowledging their understanding of and commitment to follow ethics policies and procedures of the organization.\n• The internal audit plan, work program, or workpapers showing consideration of the organization's ethics-related objectives, risks, and control processes.\n• Documentation demonstrating that ethical issues were communicated to the board, senior management, and regulators in accordance with the organization's policies and relevant laws and/or regulations.","rating":"GC"},
  {"domain":"II. Ethics and Professionalism","principle":"1. Demonstrate Integrity","standard":"1.3 Legal and Ethical Behavior","question":"Are there documented procedures and training for handling legal and ethical issues in auditing?","evidence":"• Records of internal auditors' participation in training on laws, regulations, and ethical and professional behavior.\n• Internal auditors' acknowledgments of their understanding of and commitment to act in accordance with relevant legal and professional expectations.\n• Documented methodologies for handling illegal or discreditable behavior by internal auditors and legal or regulatory violations by individuals within the organization.\n• Documented communication between internal auditors and their supervisors and/or legal counsel that address concerns about illegal or unprofessional actions.\n• Sign-off that workpapers were reviewed.\n• Final engagement communication, if applicable.","rating":"GC"},
  {"domain":"II. Ethics and Professionalism","principle":"2. Maintain Objectivity","standard":"2.1 Individual Objectivity","question":"Do auditors confirm objectivity and disclose any impairments before starting assignments?","evidence":"• References in the internal audit charter to internal auditors' responsibility for maintaining objectivity.\n• Policies and procedures related to objectivity.\n• Records of planned and completed objectivity training, including list of participants.\n• Attestation forms that confirm internal auditors' awareness of objectivity's importance and the obligation to disclose any potential impairments.\n• Documented disclosures of potential conflicts of interest or other impairments to objectivity.\n• Notes from supervisory reviews and mentoring of internal auditors.","rating":"GC"},
  {"domain":"II. Ethics and Professionalism","principle":"2. Maintain Objectivity","standard":"2.2 Safeguarding Objectivity","question":"Are safeguards implemented and monitored to maintain objectivity in all engagements?","evidence":"• Policies and procedures for identifying potential impairments and necessary safeguards.\n• Records of objectivity training.\n• Documentation through which internal auditors attest that they either have no known impairments or have disclosed potential impairments.\n• Sources of feedback on the perception of internal auditors' objectivity, such as surveys of the internal audit function's stakeholders.\n• Notes from supervisory reviews.\n• Remuneration plan.\n• Minutes of board meetings where impairments to objectivity were discussed.\n• Plans showing alternative provisions to fulfill the internal audit plan activities where impairments to objectivity were unavoidable.\n• Results of external quality assessments performed by an independent assessor.","rating":"GC"},
  {"domain":"II. Ethics and Professionalism","principle":"2. Maintain Objectivity","standard":"2.3 Disclosing Impairments to Objectivity","question":"Are objectivity impairments disclosed timely and with approved mitigation strategies?","evidence":"• Internal audit methodologies for disclosing objectivity impairments.\n• Documentation disclosing the presence or affirming the absence of objectivity impairments.\n• Records of the disclosure of objectivity impairments and the response from and/or approval of the mitigation by appropriate parties.","rating":"GC"},
  {"domain":"II. Ethics and Professionalism","principle":"3. Demonstrate Competency","standard":"3.1 Competency","question":"Are auditors' qualifications tracked, and are skills sufficient for executing the audit plan?","evidence":"• Documentation listing the certifications, education, experience, work history, and other qualifications of internal auditors.\n• Internal auditors' self-assessments of their competencies and plans for professional development.\n• Documentation of internal auditors' completion of continuing professional education, such as courses, conference sessions, workshops, and seminars.\n• Documented performance reviews of internal auditors.\n• Documented supervisory reviews of engagements, post-engagement surveys completed by internal audit stakeholders, and other forms of feedback indicating competencies exhibited by individual internal auditors and the internal audit function.\n• The results of internal and external quality assessments.\n• Documentation of relevant competencies necessary to fulfill the internal audit plan, an analysis of resource gaps, and the identification of the training and budget necessary to fill the gaps.\n• Documentation such as an assurance map that indicates the competencies of other providers of assurance and advisory services upon which the internal audit function may rely.","rating":"GC"},
  {"domain":"II. Ethics and Professionalism","principle":"3. Demonstrate Competency","standard":"3.2 Continuing Professional Development","question":"Are CPE records and development plans maintained and aligned with professional requirements?","evidence":"• Documented plans for attending training events, professional conferences, and other continuing professional education.\n• Records of internal auditors' completed continuing professional education and credentials obtained.\n• Internal auditors' performance reviews and/or plans for professional development.\n• Evidence of active involvement in The IIA and other relevant professional organizations, such as volunteer service.","rating":"GC"},
  {"domain":"II. Ethics and Professionalism","principle":"4. Exercise Due Professional Care","standard":"4.1 Conformance with the Global Internal Audit Standards","question":"Is the audit function's methodology up to date and compliant with the Standards?","evidence":"• Documentation of the internal audit function's methodologies and an indication of when they were last updated.\n• If applicable, final engagement communications and communications with the board and senior management where nonconformance has been disclosed.\n• Documentation referencing the laws and/or regulations with which internal auditors were required to comply that prevented their conformance with the Standards.\n• Documentation referencing authoritative requirements to which the internal audit function adheres in addition to the Standards.\n• Results of the quality assurance and improvement program.","rating":"GC"},
  {"domain":"II. Ethics and Professionalism","principle":"4. Exercise Due Professional Care","standard":"4.2 Due Professional Care","question":"Are risks, controls, and costs assessed carefully in engagement planning and execution?","evidence":"• Planning notes documenting the strategy and objectives of the organization and activity under review.\n• Documented assessments of governance, risk management, and control processes.\n• Notes showing assessment of risks including errors, noncompliance, and fraud.\n• Notes from meetings or discussions of the potential costs and benefits of internal audit services and the extent and timeliness of engagement work.\n• Workpapers indicating supervisory review of engagements.\n• Internal auditors' performance reviews.\n• Notes from meetings, training, or other discussion of due professional care.\n• Feedback from stakeholders solicited through surveys or other tools.\n• Internal and external assessments performed as part of the internal audit function's quality assurance and improvement program.","rating":"GC"},
  {"domain":"II. Ethics and Professionalism","principle":"4. Exercise Due Professional Care","standard":"4.3 Professional Skepticism","question":"Are auditors trained and evaluated on their use of professional skepticism during audits?","evidence":"• Records of relevant training planned and completed, including a list of participants.\n• Workpapers identifying an internal auditor's approach to evaluate and validate information gathered during an engagement.\n• Documentation that false or misleading information was handled as an engagement finding.\n• Workpapers and engagement communications, reviewed and signed or initialed by the engagement supervisor.","rating":"GC"},
  {"domain":"II. Ethics and Professionalism","principle":"5. Maintain Confidentiality","standard":"5.1 Use of Information","question":"Are access and information use controls enforced and tested regularly?","evidence":"• Effectively designed and operating controls over access to and use of information.\n• Documentation of relevant policies, procedures, and training related to the proper use of information.\n• Minutes from meetings during which the appropriate use of information was discussed.\n• Attendance records of training on use of information.\n• Documentation by which internal auditors acknowledge their understanding of relevant policies, procedures, laws, and regulations.\n• Performance reviews demonstrating that relevant policies, procedures, laws, and regulations have been followed.","rating":"GC"},
  {"domain":"II. Ethics and Professionalism","principle":"5. Maintain Confidentiality","standard":"5.2 Protection of Information","question":"Are confidentiality policies followed and reviewed periodically?","evidence":"• Documentation demonstrating application of relevant methodologies.\n• Documentation regarding the implementation of mechanisms that restrict information access and mitigate the risk of circumventing prevailing controls.\n• Attendance records of training on protection of information.\n• Documentation by which internal auditors acknowledge their understanding of relevant policies, procedures, laws, and regulations.\n• Documentation of restrictions on the distribution of workpapers and final communication.\n• Documentation of authorized disclosures and distribution.\n• Records of disclosures required by law or approved by legal counsel, if applicable, and/or the board and senior management.\n• Signed agreements to confidentiality or nondisclosure of information.\n• Performance reviews demonstrating that policies and procedures related to the protection and disclosure of information have been followed.","rating":"GC"},
  {"domain":"III. Governing the Internal Audit Function","principle":"6. Authorized by the Board","standard":"6.1 Internal Audit Mandate","question":"Has the board formally approved the internal audit mandate?","evidence":"• Minutes of board meetings where the mandate was discussed, which may be part of the broader approval of the internal audit charter.\n• Minutes of board meetings during which any changes to the internal audit charter are discussed and approved by the board.","rating":"GC"},
  {"domain":"III. Governing the Internal Audit Function","principle":"6. Authorized by the Board","standard":"6.2 Internal Audit Charter","question":"Is the charter reviewed regularly and approved by the board?","evidence":"• Minutes of board meetings during which the internal audit charter were discussed and approved.\n• The approved charter and the date approved.\n• Minutes of board meetings that include evidence that the chief audit executive periodically reviews the internal audit charter with the board and senior management.","rating":"GC"},
  {"domain":"III. Governing the Internal Audit Function","principle":"6. Authorized by the Board","standard":"6.3 Board and Senior Management Support","question":"Is there documented board and senior management support for audit plans and access?","evidence":"• Minutes of board meetings indicating board review and approval of the internal audit plan, internal audit budget, and resource plan.\n• Minutes or other documentation of communication between the board and senior management in which the internal audit function's unrestricted access was discussed.\n• An agreed-upon matrix or similar documentation showing what information should be communicated by the chief audit executive to the board and senior management and the expected frequency.","rating":"GC"},
  {"domain":"III. Governing the Internal Audit Function","principle":"7. Positioned Independently","standard":"7.1 Organizational Independence","question":"Does the CAE report functionally to the board with safeguards for independence?","evidence":"• The internal audit charter, which documents the internal audit function's reporting relationships.\n• Meeting minutes or other evidence of the chief audit executive's direct communication with the board and senior management regarding potential impairments to independence and planned safeguards.\n• Board meeting minutes or other documentation showing that the chief audit executive confirmed with the board the ongoing independence of the internal audit function or discussed impairments affecting the internal audit function's ability to fulfill its mandate and the safeguards to manage the impairments.\n• Documented methodologies to be followed when an impairment is suspected or identified.\n• Formal action plans that outline specific safeguards to address independence concerns.","rating":"GC"},
  {"domain":"III. Governing the Internal Audit Function","principle":"7. Positioned Independently","standard":"7.2 Chief Audit Executive Qualifications","question":"Are the CAE's qualifications documented and evaluated by the board?","evidence":"• Documented approval by the board of the chief audit executive's job description and/or appointment or other evidence that the board evaluated the qualifications and competencies required for the chief audit executive's role.\n• The chief audit executive's professional education plans and evidence of completion.\n• Documented participation in professional associations.\n• Documented succession-planning conversations with the board, senior management, and/or the organization's human resources function.","rating":"GC"},
  {"domain":"III. Governing the Internal Audit Function","principle":"8. Overseen by the Board","standard":"8.1 Board Interaction","question":"Does the CAE communicate regularly and effectively with the board?","evidence":"• Board agendas and meeting minutes documenting the nature, topics, and frequency of discussions with the chief audit executive.\n• Presentations made by the chief audit executive to the board.\n• Internal audit communications to board members.\n• Documentation of the criteria for identifying issues to be brought to the attention of the board and a process for communicating or escalating such issues.","rating":"GC"},
  {"domain":"III. Governing the Internal Audit Function","principle":"8. Overseen by the Board","standard":"8.2 Resources","question":"Are internal audit resources sufficient and discussed with the board?","evidence":"• Agendas, meeting minutes, and communications between the chief audit executive and the board and/or senior management, documenting discussions of the sufficiency of internal audit resources.\n• Internal audit resource plans indicating the sufficiency of resources needed to achieve the internal audit plan.\n• Budget requests pertaining to internal audit resources.\n• Documentation of gap analyses between the internal audit plan and available resources.\n• Documentation of a cost-benefit analysis.\n• Documentation of the chief audit executive's resourcing strategy.","rating":"GC"},
  {"domain":"III. Governing the Internal Audit Function","principle":"8. Overseen by the Board","standard":"8.3 Quality","question":"Is there an ongoing quality assurance program with board oversight?","evidence":"• Agendas and minutes from board meetings documenting discussions with the chief audit executive about the internal audit function's quality assurance and improvement program.\n• Chief audit executive presentations and other communications covering the results of the quality assessments and status of action plans to address any opportunities for improvement.\n• Quality assurance and improvement program workpapers or other evidence demonstrating the completion of related activities.","rating":"GC"},
  {"domain":"III. Governing the Internal Audit Function","principle":"8. Overseen by the Board","standard":"8.4 External Quality Assessment","question":"Has the function undergone an external quality assessment at least every five years?","evidence":"• Board meeting minutes where the chief audit executive's external quality assessment plan is discussed and approved by the board.\n• Formal external quality assessment report prepared and validated by a qualified, independent assessor.\n• Presentations to the board by external assessors covering the results of the external quality assessment.\n• Chief audit executive presentations to the board covering external assessment results and action plans, as appropriate.","rating":"GC"},
  {"domain":"IV. Managing the Internal Audit Function","principle":"9. Plan Strategically","standard":"9.1 Understanding Governance, Risk Management and Control Processes","question":"Has the CAE documented understanding of GRC frameworks and organizational strategy?","evidence":"• Documentation of the chief audit executive's inquiry, gathering, review, and consideration of the governance, risk management, and control frameworks and processes used by the organization.\n• Review of the agendas and minutes from board meetings documenting discussion of the organization's governance, risk management, and control processes.\n• Meeting minutes or notes from discussions between the chief audit executive and those in the organization with roles in governance and risk management.\n• Review of the organization's risk appetite statement or documented communication with the board and senior management regarding the organization's risk appetite and risk tolerance.\n• Documentation of orientation or training provided to internal audit staff regarding the organization's governance, risk management, and control processes.\n• Review of business strategies and business plans.\n• Review of communications received from regulators.\n• Demonstrated understanding of the organization's risk and control matrix.","rating":"GC"},
  {"domain":"IV. Managing the Internal Audit Function","principle":"9. Plan Strategically","standard":"9.2 Internal Audit Strategy","question":"Is there a documented internal audit strategy aligned with organizational objectives?","evidence":"• Documented internal audit strategy, including vision, strategic objectives, and supporting initiatives.\n• Minutes or correspondence from meetings with the board, senior management, and/or other stakeholders where expectations were discussed.\n• Notes showing the information and analyses that informed the strategy.\n• Internal audit methodologies for producing and reviewing the internal audit strategy and monitoring its implementation.\n• Results of periodic self-assessments or other reviews of the progress on initiatives.","rating":"GC"},
  {"domain":"IV. Managing the Internal Audit Function","principle":"9. Plan Strategically","standard":"9.3 Methodologies","question":"Are standardized methodologies documented, communicated, and used?","evidence":"• Documentation of software program incorporating methodologies.\n• Meeting agendas and minutes, emails, signed acknowledgments, training schedules, or similar documentation evidencing communications to internal audit personnel about internal audit methodologies.\n• Documentation of quality reviews of audit work demonstrating that methodologies are followed.\n• Documentation of updates to the methodologies.","rating":"GC"},
  {"domain":"IV. Managing the Internal Audit Function","principle":"9. Plan Strategically","standard":"9.4 Internal Audit Plan","question":"Is the audit plan based on documented risk assessment and approved by the board?","evidence":"• Approved internal audit plan.\n• Documented risk assessment and prioritization, including the inputs upon which the plan is based.\n• Minutes of meetings in which the chief audit executive discussed with the board and senior management the audit universe, organizationwide risk assessment, internal audit plan, and the criteria and protocol for handling significant changes to the plan.\n• Documented list of those to whom the internal audit plan was distributed.\n• Documented methodologies for organizationwide risk assessment and protocol for handling significant changes.","rating":"GC"},
  {"domain":"IV. Managing the Internal Audit Function","principle":"9. Plan Strategically","standard":"9.5 Coordination and Reliance","question":"Are coordination efforts and reliance decisions documented and agreed upon with other providers?","evidence":"• Communications regarding distinct assurance and advisory roles and responsibilities.\n• Assurance maps and/or combined assurance plans that identify which provider is responsible for assurance services in each area.\n• Documentation and implementation of the methodology to determine whether to rely on a provider's work.\n• Documented agreements with other assurance providers confirming the specifications of the assurance work they will perform.","rating":"GC"},
  {"domain":"IV. Managing the Internal Audit Function","principle":"10. Manage Resources","standard":"10.1 Financial Resources Management","question":"Is the budget aligned with the audit plan and monitored?","evidence":"• Documentation of the internal audit plan against the budget, forecast, and actual expenses.\n• Minutes of meetings in which the chief audit executive discussed the internal audit budget with the board and senior management.\n• Board meeting minutes discussing the internal audit function's budget and approval.","rating":"GC"},

let assessments = {};
let saveTimer = null;

async function loadAssessments() {
  try {
    const res = await fetch('/api/assessment');
    const data = await res.json();
    if (Object.keys(data).length > 0) {
      assessments = data;
    } else {
      seedDefaults();
      await persistSave();
    }
  } catch {
    const local = localStorage.getItem('qaip_tracker_2025');
    assessments = local ? JSON.parse(local) : {};
    if (!Object.keys(assessments).length) seedDefaults();
  }
}

function seedDefaults() {
  QAIP_DATA.forEach((item, i) => {
    assessments[i] = { rating: item.rating || null, notes: '', files: [] };
  });
}

async function persistSave() {
  try {
    await fetch('/api/assessment', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(assessments)
    });
    localStorage.setItem('qaip_tracker_2025', JSON.stringify(assessments));
  } catch {
    localStorage.setItem('qaip_tracker_2025', JSON.stringify(assessments));
  }
}

function save() {
  const el = document.getElementById('saveStatus');
  el.textContent = 'Saving…';
  clearTimeout(saveTimer);
  saveTimer = setTimeout(async () => {
    await persistSave();
    el.textContent = 'Saved to file';
    setTimeout(() => { el.textContent = 'All changes saved'; }, 1500);
  }, 600);
}

function getDomains() {
  const map = new Map();
  QAIP_DATA.forEach((item, i) => {
    if (!map.has(item.domain)) map.set(item.domain, { principles: new Map(), indices: [] });
    const d = map.get(item.domain);
    d.indices.push(i);
    const pKey = item.principle || '__none__';
    if (!d.principles.has(pKey)) d.principles.set(pKey, []);
    d.principles.get(pKey).push(i);
  });
  return map;
}

function calcConformance(indices) {
  const rated = indices.filter(i => assessments[i]?.rating);
  const gc = rated.filter(i => assessments[i].rating === 'GC').length;
  const dnc = rated.filter(i => assessments[i].rating === 'DNC').length;
  const total = indices.length;
  if (rated.length === 0) return { badge: null, gc, pc: rated.filter(i => assessments[i].rating === 'PC').length, dnc, total, rated: rated.length };
  const pct = gc / total * 100;
  let badge;
  if (pct >= 80 && dnc === 0) badge = 'GC';
  else if (pct >= 50 || dnc <= 2) badge = 'PC';
  else badge = 'DNC';
  return { badge, gc, pc: rated.filter(i => assessments[i].rating === 'PC').length, dnc, total, rated: rated.length };
}

function badgeClass(r) {
  if (r === 'GC') return 'bg-gc';
  if (r === 'PC') return 'bg-pc';
  if (r === 'DNC') return 'bg-dnc';
  return 'bg-nr';
}
function fillClass(r) {
  if (r === 'GC') return 'fill-gc';
  if (r === 'PC') return 'fill-pc';
  if (r === 'DNC') return 'fill-dnc';
  return 'fill-nr';
}
function cardClass(r) {
  if (r === 'GC') return 'rated-gc';
  if (r === 'PC') return 'rated-pc';
  if (r === 'DNC') return 'rated-dnc';
  return 'unrated';
}

function buildSidebar(domains) {
  const nav = document.getElementById('domainNav');
  let html = '';
  let di = 0;
  for (const [domain, data] of domains) {
    const c = calcConformance(data.indices);
    const pct = (c.rated / c.total * 100).toFixed(0);
    html += `<a class="domain-nav-item" href="#domain-${di}" onclick="setActive(this)" data-di="${di}">
      <div class="domain-nav-label">${domain}</div>
      <div class="domain-nav-meta">
        <div class="domain-mini-bar"><div class="domain-mini-fill ${fillClass(c.badge)}" style="width:${pct}%" id="dmb-${di}"></div></div>
        <span class="domain-nav-badge ${badgeClass(c.badge)}" id="dnb-${di}">${c.badge || '—'}</span>
      </div>
    </a>`;
    di++;
  }
  nav.innerHTML = html;
}

function setActive(el) {
  document.querySelectorAll('.domain-nav-item').forEach(e => e.classList.remove('active'));
  el.classList.add('active');
}

function buildMain(domains) {
  const main = document.getElementById('main');
  let html = '';
  let di = 0;
  for (const [domain, data] of domains) {
    const c = calcConformance(data.indices);
    html += `<section class="domain-section" id="domain-${di}">
      <div class="domain-header">
        <div class="domain-title">${domain}</div>
        <span class="domain-progress" id="dp-${di}">${c.rated}/${c.total} assessed</span>
        <span class="domain-badge ${badgeClass(c.badge)}" id="db-${di}">${c.badge || 'Not Assessed'}</span>
      </div>`;
    for (const [principle, indices] of data.principles) {
      if (principle !== '__none__') {
        html += `<div class="principle-group"><div class="principle-label">${principle}</div>`;
      } else {
        html += `<div class="principle-group">`;
      }
      indices.forEach(i => {
        const item = QAIP_DATA[i];
        const a = assessments[i] || {};
        const r = a.rating;
        html += `<div class="std-card ${cardClass(r)}" id="card-${i}">
          <div class="std-card-header">
            ${item.standard ? `<span class="std-code">${item.standard}</span>` : ''}
            <span class="std-question">${item.question}</span>
            <span class="std-badge ${badgeClass(r)}" id="sb-${i}">${r || '—'}</span>
          </div>
          <div class="std-body">
            ${item.evidence ? `
            <div class="evidence-toggle" onclick="toggleEvidence(${i})" id="et-${i}">
              <svg width="12" height="12" viewBox="0 0 12 12"><path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg>
              Show evidence examples
            </div>
            <div class="evidence-box" id="ev-${i}">${escHtml(item.evidence)}</div>` : ''}
            <div class="rating-row">
              <span class="rating-label">Rating:</span>
              <button class="r-btn gc ${r==='GC'?'active':''}" onclick="setRating(${i},'GC')">Generally Conforms (GC)</button>
              <button class="r-btn pc ${r==='PC'?'active':''}" onclick="setRating(${i},'PC')">Partially Conforms (PC)</button>
              <button class="r-btn dnc ${r==='DNC'?'active':''}" onclick="setRating(${i},'DNC')">Does Not Conform (DNC)</button>
              <button class="r-btn nr ${!r?'active':''}" onclick="setRating(${i},null)">Clear</button>
            </div>
            <textarea class="notes-area" id="nt-${i}" placeholder="Assessment notes, observations, evidence references..." onchange="setNotes(${i},this.value)">${escHtml(a.notes||'')}</textarea>
            <div class="upload-section">
              <div class="upload-label">
                <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21.44 11.05l-9.19 9.19a6 6 0 01-8.49-8.49l9.19-9.19a4 4 0 015.66 5.66l-9.2 9.19a2 2 0 01-2.83-2.83l8.49-8.48"/></svg>
                Evidence Documents
              </div>
              <div class="upload-zone" id="uz-${i}" onclick="document.getElementById('fi-${i}').click()" ondragover="dragOver(event,${i})" ondragleave="dragLeave(${i})" ondrop="dropFile(event,${i})">
                <input type="file" id="fi-${i}" multiple onchange="handleFiles(${i},this.files)">
                <svg class="upload-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                <div class="upload-text">
                  <strong>Click to upload</strong> or drag &amp; drop<br>
                  PDF, Word, Excel, images supported
                </div>
              </div>
              <div class="file-list" id="fl-${i}">${renderFileList(i)}</div>
            </div>
          </div>
        </div>`;
      });
      html += `</div>`;
    }
    html += `</section>`;
    di++;
  }
  main.innerHTML = html;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

function toggleEvidence(i) {
  const box = document.getElementById(`ev-${i}`);
  const tog = document.getElementById(`et-${i}`);
  const open = box.classList.toggle('open');
  tog.classList.toggle('open', open);
  tog.querySelector('span') && null;
  const svg = tog.querySelector('svg');
  tog.innerHTML = `<svg width="12" height="12" viewBox="0 0 12 12"><path d="M4 2l4 4-4 4" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round"/></svg> ${open ? 'Hide' : 'Show'} evidence examples`;
  box.classList.toggle('open', open);
}

function setRating(i, r) {
  assessments[i] = assessments[i] || {};
  assessments[i].rating = r;
  // Update card
  const card = document.getElementById(`card-${i}`);
  card.className = `std-card ${cardClass(r)}`;
  document.getElementById(`sb-${i}`).className = `std-badge ${badgeClass(r)}`;
  document.getElementById(`sb-${i}`).textContent = r || '—';
  // Update buttons
  ['GC','PC','DNC',null].forEach(v => {
    const key = v === null ? 'nr' : v.toLowerCase();
    card.querySelectorAll(`.r-btn.${key}`).forEach(b => b.classList.toggle('active', r === v));
  });
  save();
  updateScores();
}

function setNotes(i, v) {
  assessments[i] = assessments[i] || {};
  assessments[i].notes = v;
  save();
}

function updateScores() {
  const domains = getDomains();
  const allIndices = QAIP_DATA.map((_,i) => i);
  const overall = calcConformance(allIndices);
  document.getElementById('overallBadge').className = `overall-badge ${badgeClass(overall.badge)}`;
  document.getElementById('overallBadge').textContent = overall.badge || '—';
  document.getElementById('overallCount').textContent = `${overall.rated} / ${overall.total} assessed`;
  document.getElementById('overallBar').style.width = `${overall.rated/overall.total*100}%`;
  document.getElementById('overallBar').className = `overall-bar-fill ${fillClass(overall.badge)}`;

  let di = 0;
  for (const [, data] of domains) {
    const c = calcConformance(data.indices);
    const pct = (c.rated / c.total * 100).toFixed(0);
    document.getElementById(`dmb-${di}`).style.width = `${pct}%`;
    document.getElementById(`dmb-${di}`).className = `domain-mini-fill ${fillClass(c.badge)}`;
    document.getElementById(`dnb-${di}`).className = `domain-nav-badge ${badgeClass(c.badge)}`;
    document.getElementById(`dnb-${di}`).textContent = c.badge || '—';
    document.getElementById(`dp-${di}`).textContent = `${c.rated}/${c.total} assessed`;
    document.getElementById(`db-${di}`).className = `domain-badge ${badgeClass(c.badge)}`;
    document.getElementById(`db-${di}`).textContent = c.badge || 'Not Assessed';
    di++;
  }
}

function confirmReset() {
  if (confirm('Reset all ratings and notes? This cannot be undone.')) {
    localStorage.removeItem(STORAGE_KEY);
    location.reload();
  }
}

      });
    }
  }

// Intersection observer for sidebar active state
function initScrollSpy(domains) {
  const sections = [...domains.keys()].map((_,i) => document.getElementById(`domain-${i}`)).filter(Boolean);
  const navItems = document.querySelectorAll('.domain-nav-item');
  const obs = new IntersectionObserver(entries => {
    entries.forEach(e => {
      if (e.isIntersecting) {
        const id = e.target.id;
        const di = id.replace('domain-','');
        navItems.forEach(n => n.classList.toggle('active', n.dataset.di === di));
        const activeItem = document.querySelector(`.domain-nav-item[data-di="${di}"]`);
        if (activeItem) activeItem.scrollIntoView({block:'nearest'});
      }
    });
  }, {threshold:0.2, rootMargin:'-56px 0px 0px 0px'});
  sections.forEach(s => obs.observe(s));
}

function fileIcon(name) {
  const ext = name.split('.').pop().toLowerCase();
  if (['pdf'].includes(ext)) return '📄';
  if (['doc','docx'].includes(ext)) return '📝';
  if (['xls','xlsx','csv'].includes(ext)) return '📊';
  if (['png','jpg','jpeg','gif','webp'].includes(ext)) return '🖼️';
  return '📎';
}

function fmtSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1048576) return (bytes/1024).toFixed(0) + ' KB';
  return (bytes/1048576).toFixed(1) + ' MB';
}

function renderFileList(i) {
  const files = assessments[i]?.files || [];
  if (!files.length) return '';
  return files.map((f, fi) => `
    <div class="file-item" id="f-${i}-${fi}">
      <span class="file-icon">${fileIcon(f.name)}</span>
      <span class="file-name" title="${escHtml(f.name)}">${escHtml(f.name)}</span>
      <span class="file-size">${f.size}</span>
      <button class="file-remove" onclick="removeFile(${i},${fi})" title="Remove">✕</button>
    </div>`).join('');
}

function handleFiles(i, fileList) {
  assessments[i] = assessments[i] || {};
  assessments[i].files = assessments[i].files || [];
  Array.from(fileList).forEach(f => {
    const already = assessments[i].files.some(x => x.name === f.name && x.size === fmtSize(f.size));
    if (!already) assessments[i].files.push({ name: f.name, size: fmtSize(f.size), date: new Date().toLocaleDateString() });
  });
  document.getElementById(`fi-${i}`).value = '';
  document.getElementById(`fl-${i}`).innerHTML = renderFileList(i);
  save();
}

function removeFile(i, fi) {
  assessments[i].files.splice(fi, 1);
  document.getElementById(`fl-${i}`).innerHTML = renderFileList(i);
  save();
}

function dragOver(e, i) {
  e.preventDefault();
  document.getElementById(`uz-${i}`).classList.add('drag-over');
}

function dragLeave(i) {
  document.getElementById(`uz-${i}`).classList.remove('drag-over');
}

function dropFile(e, i) {
  e.preventDefault();
  dragLeave(i);
  handleFiles(i, e.dataTransfer.files);
}
